<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐺 Agent Telemetry Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e8e8e8;
      min-height: 100vh;
      padding: 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid #ff6b35;
    }
    .header h1 { font-size: 28px; }
    .header h1 span { color: #ff6b35; }
    .live-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #888;
    }
    .live-dot {
      width: 10px;
      height: 10px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Summary Cards */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .summary-card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
      border-left: 4px solid #ff6b35;
    }
    .summary-card .label { font-size: 12px; color: #888; text-transform: uppercase; }
    .summary-card .value { font-size: 32px; font-weight: bold; margin-top: 4px; }
    .summary-card .value.green { color: #4ade80; }
    .summary-card .value.orange { color: #ff6b35; }

    /* Agent Grid */
    .section-title { font-size: 18px; margin-bottom: 16px; color: #ff6b35; }
    .agents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .agent-card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .agent-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .agent-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
    }
    .agent-avatar.ceo { background: linear-gradient(135deg, #ff6b35, #f7931e); }
    .agent-avatar.cto { background: linear-gradient(135deg, #667eea, #764ba2); }
    .agent-avatar.engineer { background: linear-gradient(135deg, #11998e, #38ef7d); }
    .agent-avatar.devops { background: linear-gradient(135deg, #eb3349, #f45c43); }
    .agent-info { flex: 1; }
    .agent-name { font-weight: 600; font-size: 16px; }
    .agent-role { font-size: 12px; color: #888; }
    .agent-stats { font-size: 11px; color: #666; margin-top: 4px; }
    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .status-badge.running { background: #4ade8033; color: #4ade80; }
    .status-badge.idle { background: #fbbf2433; color: #fbbf24; }
    .status-badge.error { background: #ef444433; color: #ef4444; }

    /* Charts */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }
    .chart-card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
    }
    .chart-card h3 { font-size: 14px; color: #888; margin-bottom: 16px; }
    .chart-container { position: relative; height: 250px; }

    /* Recent Runs Table */
    .runs-table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      overflow: hidden;
    }
    .runs-table th, .runs-table td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .runs-table th {
      background: rgba(255,107,53,0.1);
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
    }
    .runs-table tr:hover { background: rgba(255,255,255,0.02); }
  </style>
</head>
<body>
  <div class="header">
    <h1>🐺 <span>Agent Telemetry</span> Dashboard</h1>
    <div class="live-indicator">
      <div class="live-dot"></div>
      <span id="last-update">Connecting...</span>
    </div>
  </div>

  <!-- Summary Cards -->
  <div class="summary-grid">
    <div class="summary-card">
      <div class="label">Total Agents</div>
      <div class="value" id="total-agents">-</div>
    </div>
    <div class="summary-card">
      <div class="label">Active Now</div>
      <div class="value green" id="active-agents">-</div>
    </div>
    <div class="summary-card">
      <div class="label">Completion Rate</div>
      <div class="value orange" id="completion-rate">-</div>
    </div>
    <div class="summary-card">
      <div class="label">Error Agents</div>
      <div class="value" style="color: #ef4444" id="error-agents">-</div>
    </div>
    <div class="summary-card">
      <div class="label">Tasks Done</div>
      <div class="value" id="tasks-done">-</div>
    </div>
    <div class="summary-card">
      <div class="label">Cost (Monthly)</div>
      <div class="value orange" id="total-cost">-</div>
    </div>
  </div>

  <!-- Agent Cards -->
  <h2 class="section-title">🤖 Agent Status</h2>
  <div class="agents-grid" id="agents-grid"></div>

  <!-- Charts -->
  <div class="charts-grid">
    <div class="chart-card">
      <h3>📈 Token Usage (Last 24h)</h3>
      <div class="chart-container">
        <canvas id="tokenChart"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <h3>🥧 Tokens by Agent</h3>
      <div class="chart-container">
        <canvas id="agentChart"></canvas>
      </div>
    </div>
  </div>

  <!-- Recent Runs -->
  <h2 class="section-title">📋 Recent Runs</h2>
  <table class="runs-table">
    <thead>
      <tr>
        <th>Run ID</th>
        <th>Agent</th>
        <th>Started</th>
        <th>Duration</th>
        <th>Task</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="runs-table"></tbody>
  </table>

  <script>
    const API_BASE = '';
    let tokenChart, agentChart;

    // Initialize charts
    function initCharts() {
      const chartOptions = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#888' } } },
        scales: {
          x: { ticks: { color: '#666' }, grid: { color: '#333' } },
          y: { ticks: { color: '#666' }, grid: { color: '#333' } }
        }
      };

      tokenChart = new Chart(document.getElementById('tokenChart'), {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Tokens', data: [], borderColor: '#ff6b35', backgroundColor: 'rgba(255,107,53,0.1)', fill: true, tension: 0.4 }] },
        options: chartOptions
      });

      agentChart = new Chart(document.getElementById('agentChart'), {
        type: 'doughnut',
        data: { labels: [], datasets: [{ data: [], backgroundColor: ['#ff6b35', '#667eea', '#11998e', '#fbbf24', '#ef4444'] }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#888' } } } }
      });
    }

    // Fetch and render agents
    async function fetchAgents() {
      try {
        const res = await fetch(`${API_BASE}/api/agents`);
        const data = await res.json();

        const grid = document.getElementById('agents-grid');
        grid.innerHTML = data.agents.map(a => {
          const roleClass = (a.role || '').toLowerCase().replace(/[^a-z]/g, '');
          const lastSeen = a.lastSeen ? new Date(a.lastSeen).toLocaleTimeString() : 'never';
          return `
          <div class="agent-card">
            <div class="agent-avatar ${roleClass}">${(a.name || '?')[0]}</div>
            <div class="agent-info">
              <div class="agent-name">${a.name}</div>
              <div class="agent-role">${a.role}</div>
              <div class="agent-stats">Last seen: ${lastSeen}</div>
            </div>
            <div class="status-badge ${a.status}">${a.status}</div>
          </div>`;
        }).join('');
      } catch (e) {
        document.getElementById('agents-grid').innerHTML = '<p style="color:#ef4444">Failed to load agents</p>';
      }
    }

    // Fetch and render stats
    async function fetchStats() {
      try {
        const res = await fetch(`${API_BASE}/api/stats`);
        const data = await res.json();
        const s = data.summary;

        document.getElementById('total-agents').textContent = s.totalAgents;
        document.getElementById('active-agents').textContent = s.activeAgents;
        document.getElementById('error-agents').textContent = s.errorAgents || 0;
        document.getElementById('completion-rate').textContent = s.completionRate + '%';
        document.getElementById('tasks-done').textContent = s.completedTasks + '/' + s.totalTasks;
        document.getElementById('total-cost').textContent = '$' + ((s.totalCostCents || 0) / 100).toFixed(2);

        tokenChart.data.labels = data.hourlyTokens.map(h => new Date(h.hour).getHours() + ':00');
        tokenChart.data.datasets[0].data = data.hourlyTokens.map(h => h.tokens);
        tokenChart.update();

        agentChart.data.labels = data.tokensByAgent.map(a => a.agent);
        agentChart.data.datasets[0].data = data.tokensByAgent.map(a => a.tokens);
        agentChart.update();

        document.getElementById('last-update').textContent = 'Updated ' + new Date().toLocaleTimeString();
      } catch (e) {
        document.getElementById('last-update').textContent = 'Update failed';
      }
    }

    // Fetch and render runs
    async function fetchRuns() {
      try {
        const res = await fetch(`${API_BASE}/api/runs?limit=10`);
        const data = await res.json();

        const tbody = document.getElementById('runs-table');
        tbody.innerHTML = data.runs.map(r => `
          <tr>
            <td>${r.id}</td>
            <td>${r.agentId}</td>
            <td>${r.startedAt ? new Date(r.startedAt).toLocaleString() : '-'}</td>
            <td>${r.duration ? r.duration + 's' : '-'}</td>
            <td>${r.title || '-'}</td>
            <td><span class="status-badge ${r.status === 'completed' ? 'running' : r.status === 'in_progress' ? 'idle' : 'error'}">${r.status}</span></td>
          </tr>
        `).join('');
      } catch (e) {
        document.getElementById('runs-table').innerHTML = '<tr><td colspan="6" style="color:#ef4444">Failed to load</td></tr>';
      }
    }

    // Initialize
    initCharts();
    fetchAgents();
    fetchStats();
    fetchRuns();

    // Auto-refresh
    setInterval(fetchAgents, 5000);
    setInterval(fetchStats, 30000);
    setInterval(fetchRuns, 15000);
  </script>
</body>
</html>
